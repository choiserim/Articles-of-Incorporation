      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);

      const toKebab = (str) => {
        return str
          .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
          .replace(/([A-Z])([A-Z][a-z])/g, '$1-$2')
          .toLowerCase();
      };

      return (
        <i 
          data-lucide={toKebab(name)} 
          className={className} 
          {...props}
        ></i>
      );
    }

                    {isAnalyzing ? (
                      <>
                        <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                        <span>AI 전문 법률 분석 및 생성 중...</span>
                      </>
                    ) : (
                      <>
                        <Icon name="Sparkles" className="w-5 h-5" />
                        <span>
                          {analyzerMode === "analyze" && "AI 조항 리스크 진단 및 대안 생성"}
                          {analyzerMode === "draft" && "최신 상법 맞춤 정관 초안 생성"}
                          {analyzerMode === "revise" && "기존 정관 전면 개정안 및 신구대비표 작성"}
                        </span>
                      </>
                    )}
                  </button>
                </div>

                {/* Result Area */}
                <div className="lg:col-span-7 flex flex-col">
                  <div className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-100 shadow-xs flex-1 flex flex-col">
                    <div className="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
                      <div className="flex items-center gap-2">
                        <Icon name="FileText" className="w-5 h-5 text-indigo-600" />
                        <h3 className="text-base font-extrabold text-slate-800">AI 분석 및 생성 결과</h3>
                      </div>
                      {analysisResult && (
                        <div className="flex items-center gap-2">
                          <button
                            onClick={handleDownloadResult}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 cursor-pointer"
                          >
                            <Icon name="Download" className="w-3.5 h-3.5" />
                            마크다운 다운로드
                          </button>
                        </div>
                      )}
                    </div>

                    {analysisError && (
                      <div className="bg-rose-50 border border-rose-200 text-rose-700 p-4 rounded-2xl text-xs font-medium my-auto">
                        <p className="font-bold mb-1">⚠️ 분석 오류 발생</p>
                        {analysisError}
                      </div>
                    )}

                    {!isAnalyzing && !analysisResult && !analysisError && (
                      <div className="my-auto py-20 text-center space-y-3">
                        <div className="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-3xl mx-auto flex items-center justify-center">
                          <Icon name="Sparkles" className="w-8 h-8" />
                        </div>
                        <h4 className="text-sm font-bold text-slate-700">AI 정관 분석 대기 중</h4>
                        <p className="text-xs text-slate-400 max-w-sm mx-auto">
                          좌측에서 모드를 선택하고 조항을 입력하거나 파일을 업로드한 뒤 [AI 분석 및 생성] 버튼을 눌러주세요.
                        </p>
                      </div>
                    )}

                    {isAnalyzing && (
                      <div className="my-auto py-20 text-center space-y-4">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p className="text-xs font-bold text-slate-600">최신 상법 및 세무 가이드를 반영하여 정관을 정밀 검토하고 있습니다...</p>
                      </div>
                    )}

                    {analysisResult && !isAnalyzing && (
                      <div className="markdown-body overflow-y-auto max-h-[750px] pr-2">
                        <div dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(analysisResult) : analysisResult }} />
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* 3. Risk Checklist View */}
            {activeTab === "checklist" && (
              <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
                {/* Score Header Card */}
                <div className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-100 shadow-xs flex flex-col sm:flex-row items-center justify-between gap-6">
                  <div className="space-y-1 text-center sm:text-left">
                    <span className="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Legal Health Diagnostic</span>
                    <h3 className="text-2xl font-black text-slate-800">법인 정관 세무·법률 리스크 진단</h3>
                    <p className="text-xs text-slate-400">아래 8가지 핵심 체크리스트에 응답하여 귀사의 정관 안전 점수를 실시간으로 확인하세요.</p>
                  </div>
                  <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <div className="text-right">
                      <p className="text-[10px] font-bold text-slate-400">정관 안전 지수</p>
                      <p className={`text-3xl font-black ${currentScore >= 80 ? "text-emerald-600" : currentScore >= 50 ? "text-amber-600" : "text-rose-600"}`}>
                        {currentScore}점
                      </p>
                    </div>
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-white ${currentScore >= 80 ? "bg-emerald-500" : currentScore >= 50 ? "bg-amber-500" : "bg-rose-500"}`}>
                      {currentScore >= 80 ? "안전" : currentScore >= 50 ? "주의" : "위험"}
                    </div>
                  </div>
                </div>

                {/* Questions List */}
                <div className="space-y-4">
                  {CHECKLIST_QUESTIONS.map((q, idx) => {
                    const isChecked = !!checkedAnswers[q.id];
                    return (
                      <div key={q.id} className={`bg-white rounded-2xl p-5 border transition-all ${isChecked ? "border-emerald-200 bg-emerald-50/10" : "border-slate-200 hover:border-slate-300"}`}>
                        <div className="flex items-start justify-between gap-4">
                          <div className="space-y-2">
                            <div className="flex items-center gap-2">
                              <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">Q{idx + 1}</span>
                              <span className="text-[10px] font-bold text-slate-400">{q.category}</span>
                              <span className="text-[10px] font-bold text-rose-500 bg-rose-50 px-1.5 py-0.5 rounded">감점 -{q.weight}점</span>
                            </div>
                            <p className="text-sm font-bold text-slate-800">{q.question}</p>
                            {!isChecked && (
                              <p className="text-xs text-rose-600 bg-rose-50/60 p-2.5 rounded-xl border border-rose-100 flex items-center gap-1.5">
                                <Icon name="AlertTriangle" className="w-4 h-4 shrink-0" />
                                <span><b>세무 리스크:</b> {q.riskDescription}</span>
                              </p>
                            )}
                          </div>
                          <button
                            onClick={() => setCheckedAnswers(prev => ({ ...prev, [q.id]: !prev[q.id] }))}
                            className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shrink-0 cursor-pointer ${isChecked ? "bg-emerald-600 text-white shadow-md shadow-emerald-100" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}
                          >
                            {isChecked ? "✓ 준수함 (안전)" : "✗ 미흡 / 미적용"}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 4. Roadmap View */}
            {activeTab === "roadmap" && (
              <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-100 shadow-xs space-y-2 text-center">
                  <span className="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Annual Compliance</span>
                  <h3 className="text-2xl font-black text-slate-800">연례 정관 정비 및 개정 로드맵</h3>
                  <p className="text-xs text-slate-400">법인세 신고 및 정기주주총회 시즌에 맞춰 체계적으로 정관을 개정하는 4단계 프로세스입니다.</p>
                </div>

                <div className="space-y-6">
                  {ROADMAP_MILESTONES.map((m) => (
                    <div key={m.step} className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-100 shadow-xs flex flex-col md:flex-row gap-6 items-start">
                      <div className="bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shrink-0 shadow-lg shadow-indigo-100">
                        0{m.step}
                      </div>
                      <div className="space-y-3 flex-1">
                        <div className="flex items-center gap-3">
                          <span className="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg">{m.period}</span>
                          <h4 className="text-lg font-bold text-slate-800">{m.title}</h4>
                        </div>
                        <p className="text-xs text-slate-500 leading-relaxed">{m.description}</p>
                        <ul className="space-y-1.5 pt-2 border-t border-slate-100">
                          {m.actions.map((act, aIdx) => (
                            <li key={aIdx} className="text-xs text-slate-600 flex items-center gap-2">
                              <span className="w-1.5 h-1.5 rounded-full bg-indigo-600"></span>
                              <span>{act}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="bg-white border-t border-slate-100 py-6 px-4 text-center text-xs text-slate-400 mt-12">
            <p>© 2026 실시간 AI 정관 생성 및 조항 리스크 개정기. All rights reserved.</p>
            <p className="mt-1">본 서비스의 AI 분석 결과는 법적 자문을 대체하지 않으며, 실제 등기 및 세무 신고 시 공인된 세무사/변호사의 검토를 권장합니다.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
